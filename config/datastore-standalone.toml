# Datastore backend config for the integration-test standalone network.
# Points the wallet-backend datastore ledger backend at the in-test minio
# (S3-compatible) container started by the integration suite. The host process
# exports ledgers into the same bucket; see internal/integrationtests/infrastructure/ledger_exporter.go.
#
# The schema is set inline so LoadSchema needs no .config.json manifest, and
# ledgers_per_file/files_per_partition here MUST match the exporter's schema.
[datastore_config]
type = "S3"

[datastore_config.params]
destination_bucket_path = "ledgers"
region = "us-east-1"
endpoint_url = "http://minio:9000"   # docker-network alias of the minio container

[datastore_config.schema]
ledgers_per_file = 1
files_per_partition = 1

[buffered_storage_backend_config]
retry_wait = "1s"   # short wait while polling for the next not-yet-exported file
